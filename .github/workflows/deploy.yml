name: Deploy FileView → GitHub Pages

on:
  push:
    branches: [main]        # dispara a cada push na main
  workflow_dispatch:        # permite rodar manualmente pelo GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true  # cancela deploy anterior se novo push chegar

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build (gera dist/)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Fazer upload do dist/
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy para GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
